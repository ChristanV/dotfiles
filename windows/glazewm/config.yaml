general:
  startup_commands:
    - "shell-exec zebar"

  shutdown_commands:
    - "shell-exec taskkill /IM zebar.exe /F"

  config_reload_commands: []

  focus_follows_cursor: false
  toggle_workspace_on_refocus: false

  cursor_jump:
    enabled: true
    trigger: "monitor_focus"

  hide_method: "cloak"
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  # Match Hyprland gaps_in = 5, gaps_out = 10
  inner_gap: "5px"
  outer_gap:
    top: "50px" # leave room for Zebar bar
    right: "10px"
    bottom: "10px"
    left: "10px"

window_effects:
  focused_window:
    border:
      enabled: true
      color: "#268bd2" # Solarized blue — matches Hyprland active_border
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: "rounded"
    transparency:
      enabled: false
      opacity: "95%"

  other_windows:
    border:
      enabled: true
      color: "#595959" # matches Hyprland inactive_border
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: true
      style: "rounded"
    transparency:
      enabled: false
      opacity: "0%"

window_behavior:
  initial_state: "tiling"
  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

workspaces:
  - name: "1"
    display_name: "1"
    bind_to_monitor: 0
  - name: "2"
    display_name: "2"
    bind_to_monitor: 0
  - name: "3"
    display_name: "3"
    bind_to_monitor: 1
  - name: "4"
    display_name: "4"
    bind_to_monitor: 1
  - name: "5"
    display_name: "5"
    bind_to_monitor: 0
  - name: "6"
    display_name: "6"
    bind_to_monitor: 0
  - name: "7"
    display_name: "7"
    bind_to_monitor: 0
  - name: "8"
    display_name: "8"
    bind_to_monitor: 0
  - name: "9"
    display_name: "9"
    bind_to_monitor: 0

window_rules:
  - commands: ["ignore"]
    match:
      - window_process: { equals: "zebar" }
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      - window_process: { equals: "PowerToys" }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_process: { equals: "PowerToys" }
        window_title: { regex: ".*? - Peek" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper" }
      - window_process: { equals: "EXCEL" }
        window_class: { not_regex: "XLMAIN" }
      - window_process: { equals: "WINWORD" }
        window_class: { not_regex: "OpusApp" }
      - window_process: { equals: "POWERPNT" }
        window_class: { not_regex: "PPTFrameClass" }

  # Mirror Hyprland: chrome opens on workspace 2, 1Password on workspace 5
  - commands: ["move --workspace 2"]
    match:
      - window_process: { equals: "chrome" }

  - commands: ["move --workspace 5"]
    match:
      - window_process: { equals: "1Password" }

binding_modes:
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

keybindings:
  # -----------------------------------------------------------------------
  # App launchers — shift+alt as mainMod, matching Hyprland shift+alt
  # -----------------------------------------------------------------------
  - commands: ["shell-exec wezterm"]
    bindings: ["shift+alt+t"]

  - commands: ["shell-exec chrome"]
    bindings: ["shift+alt+b"]

  - commands: ["shell-exec explorer"]
    bindings: ["shift+alt+f"]

  # Launcher (rofi equivalent — requires PowerToys Run or similar)
  - commands: ["shell-exec powertoys"]
    bindings: ["shift+alt+r"]

  # -----------------------------------------------------------------------
  # Window actions
  # -----------------------------------------------------------------------
  - commands: ["close"]
    bindings: ["shift+alt+w"]

  - commands: ["toggle-floating --centered"]
    bindings: ["shift+alt+v"]

  - commands: ["toggle-fullscreen"]
    bindings: ["shift+alt+o"]

  # Minimize — closest equivalent to Hyprland scratchpad toggle
  - commands: ["toggle-minimized"]
    bindings: ["shift+alt+s"]

  # Cycle window focus types (tiling → floating → fullscreen)
  - commands: ["wm-cycle-focus"]
    bindings: ["shift+alt+tab"]

  - commands: ["toggle-tiling-direction"]
    bindings: ["shift+alt+q"]

  # -----------------------------------------------------------------------
  # WM management
  # -----------------------------------------------------------------------
  - commands: ["wm-reload-config"]
    bindings: ["shift+alt+x"] # mirrors Hyprland shift+alt+x (waybar restart)

  - commands: ["wm-toggle-pause"]
    bindings: ["shift+alt+p"]

  - commands: ["wm-exit"]
    bindings: ["shift+alt+e"]

  - commands: ["wm-redraw"]
    bindings: ["shift+alt+shift+x"]

  - commands: ["wm-enable-binding-mode --name resize"]
    bindings: ["ctrl+shift+r"]

  # -----------------------------------------------------------------------
  # Focus — shift+alt+arrows / hjkl
  # -----------------------------------------------------------------------
  - commands: ["focus --direction left"]
    bindings: ["shift+alt+left", "shift+alt+h"]
  - commands: ["focus --direction right"]
    bindings: ["shift+alt+right", "shift+alt+l"]
  - commands: ["focus --direction up"]
    bindings: ["shift+alt+up", "shift+alt+k"]
  - commands: ["focus --direction down"]
    bindings: ["shift+alt+down", "shift+alt+j"]

  # -----------------------------------------------------------------------
  # Move window — ctrl+alt+hjkl / arrows
  # (Hyprland: shift+alt+shift+hjkl; ctrl+alt is the cleanest Windows equiv)
  # -----------------------------------------------------------------------
  - commands: ["move --direction left"]
    bindings: ["ctrl+alt+h", "ctrl+alt+left"]
  - commands: ["move --direction right"]
    bindings: ["ctrl+alt+l", "ctrl+alt+right"]
  - commands: ["move --direction up"]
    bindings: ["ctrl+alt+k", "ctrl+alt+up"]
  - commands: ["move --direction down"]
    bindings: ["ctrl+alt+j", "ctrl+alt+down"]

  # -----------------------------------------------------------------------
  # Workspaces — shift+alt+N to focus, ctrl+shift+N to move window
  # Mirrors Hyprland exactly
  # -----------------------------------------------------------------------
  - commands: ["focus --workspace 1"]
    bindings: ["shift+alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["shift+alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["shift+alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["shift+alt+4"]
  - commands: ["focus --workspace 5"]
    bindings: ["shift+alt+5"]
  - commands: ["focus --workspace 6"]
    bindings: ["shift+alt+6"]
  - commands: ["focus --workspace 7"]
    bindings: ["shift+alt+7"]
  - commands: ["focus --workspace 8"]
    bindings: ["shift+alt+8"]
  - commands: ["focus --workspace 9"]
    bindings: ["shift+alt+9"]

  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["ctrl+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["ctrl+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["ctrl+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["ctrl+shift+4"]
  - commands: ["move --workspace 5", "focus --workspace 5"]
    bindings: ["ctrl+shift+5"]
  - commands: ["move --workspace 6", "focus --workspace 6"]
    bindings: ["ctrl+shift+6"]
  - commands: ["move --workspace 7", "focus --workspace 7"]
    bindings: ["ctrl+shift+7"]
  - commands: ["move --workspace 8", "focus --workspace 8"]
    bindings: ["ctrl+shift+8"]
  - commands: ["move --workspace 9", "focus --workspace 9"]
    bindings: ["ctrl+shift+9"]

  # -----------------------------------------------------------------------
  # Move workspace to another monitor
  # -----------------------------------------------------------------------
  - commands: ["move-workspace --direction left"]
    bindings: ["ctrl+alt+shift+h"]
  - commands: ["move-workspace --direction right"]
    bindings: ["ctrl+alt+shift+l"]
