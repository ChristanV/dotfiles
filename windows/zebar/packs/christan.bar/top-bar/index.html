<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* ------------------------------------------------------------------ */
      /* Reset & base — mirrors Waybar's * { font-size: 23px; font-family: monospace } */
      /* ------------------------------------------------------------------ */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          "JetBrainsMono Nerd Font", "CaskaydiaCove Nerd Font",
          "Cascadia Code NF", "FiraCode Nerd Font", monospace;
        font-size: 14px;
      }

      body {
        background: transparent;
        color: #fdf6e3;
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: start;
        padding: 5px 8px 0 8px;
        gap: 8px;
        overflow: hidden;
      }

      /* ------------------------------------------------------------------ */
      /* Panels — mirrors Waybar .modules-left/center/right rounded pills    */
      /* ------------------------------------------------------------------ */
      .panel {
        background: #1a1a1a;
        border: 2px solid #268bd2;
        border-radius: 20px;
        padding: 0 8px;
        height: 40px;
        display: flex;
        align-items: center;
      }

      .panel-left {
        justify-self: start;
      }
      .panel-center {
        justify-self: center;
      }
      .panel-right {
        justify-self: end;
      }

      /* ------------------------------------------------------------------ */
      /* Modules — mirrors Waybar padding: 0 10px                            */
      /* ------------------------------------------------------------------ */
      .mod {
        padding: 0 10px;
        display: flex;
        align-items: center;
        white-space: nowrap;
        gap: 4px;
      }

      /* Separator between modules (visual only) */
      .mod + .mod {
        border-left: 1px solid #2a2a2a;
      }

      /* ------------------------------------------------------------------ */
      /* Module colors — same as Waybar style.css                            */
      /* ------------------------------------------------------------------ */
      .mod-logo {
        color: #268bd2;
        font-size: 16px;
      }
      .mod-audio {
        color: #268bd2;
      }
      .mod-memory {
        color: #2aa198;
      }
      .mod-cpu {
        color: #42bff5;
      }
      .mod-gpu {
        color: #8df542;
      }
      .mod-disk {
        color: #b58900;
      }
      .mod-network {
        color: #fdf6e3;
      }
      .mod-clock {
        color: #fdf6e3;
      }
      .mod-power {
        color: #fdf6e3;
        cursor: pointer;
      }
      .mod-power:hover {
        color: #dc322f;
      }

      /* ------------------------------------------------------------------ */
      /* Workspaces — mirrors Waybar #workspaces button styles               */
      /* ------------------------------------------------------------------ */
      .workspaces {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .ws-btn {
        padding: 2px 8px;
        border-radius: 12px;
        border: none;
        background: transparent;
        color: #fdf6e3;
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.1s;
      }

      .ws-btn:hover {
        background: rgba(38, 139, 210, 0.25);
      }

      .ws-btn.focused {
        color: #268bd2;
      }

      .ws-btn.active {
        background: #268bd2;
        color: #000000;
        border: 2px solid #268bd2;
      }
    </style>
  </head>
  <body>
    <!-- LEFT: logo | workspaces | network -->
    <div class="panel panel-left">
      <div class="mod mod-logo"></div>
      <div class="mod">
        <div class="workspaces" id="workspaces"></div>
      </div>
      <div class="mod mod-network" id="network"></div>
    </div>

    <!-- CENTER: weekday | time | date -->
    <div class="panel panel-center">
      <div class="mod mod-clock" id="clock-day"></div>
      <div class="mod mod-clock" id="clock-time"></div>
      <div class="mod mod-clock" id="clock-date"></div>
    </div>

    <!-- RIGHT: audio | memory | cpu | gpu | disk | power -->
    <div class="panel panel-right">
      <div class="mod mod-audio" id="audio"></div>
      <div class="mod mod-memory" id="memory"></div>
      <div class="mod mod-cpu" id="cpu"></div>
      <div class="mod mod-gpu" id="gpu"></div>
      <div class="mod mod-disk" id="disk"></div>
      <div class="mod mod-power" id="power">⏻</div>
    </div>

    <script type="module">
      import { createProviderGroup } from "zebar";

      const providers = createProviderGroup({
        glazewm: { type: "glazewm" },
        clock: { type: "clock", refreshInterval: 1000 },
        cpu: { type: "cpu", refreshInterval: 10000 },
        memory: { type: "memory", refreshInterval: 10000 },
        audio: { type: "audio" },
        network: { type: "network", refreshInterval: 5000 },
        disk: { type: "disk", refreshInterval: 5000 },
        gpu: { type: "gpu", refreshInterval: 10000 },
      });

      providers.onOutput(() => render(providers.outputMap));

      // Initial clock render without waiting for provider
      updateClock();
      setInterval(updateClock, 1000);

      // Power button — runs via GlazeWM shell-exec on click
      document.getElementById("power").addEventListener("click", () => {
        providers.outputMap.glazewm?.runCommand("shell-exec shutdown /s /t 0");
      });

      function render(out) {
        renderWorkspaces(out.glazewm);
        renderNetwork(out.network);
        renderAudio(out.audio);
        renderMemory(out.memory);
        renderCpu(out.cpu);
        renderGpu(out.gpu);
        renderDisk(out.disk);
      }

      /* ------------------------------------------------------------------ */
      /* Workspaces                                                           */
      /* ------------------------------------------------------------------ */
      function renderWorkspaces(glazewm) {
        if (!glazewm) return;
        const el = document.getElementById("workspaces");
        el.innerHTML = "";
        for (const ws of glazewm.currentWorkspaces ?? []) {
          const btn = document.createElement("button");
          btn.className = "ws-btn" + (ws.hasFocus ? " active" : "");
          btn.textContent = ws.displayName ?? ws.name;
          btn.addEventListener("click", () =>
            glazewm.runCommand(`focus --workspace ${ws.name}`),
          );
          el.appendChild(btn);
        }
      }

      /* ------------------------------------------------------------------ */
      /* Clock — three segments matching Waybar clock#1/#2/#3                */
      /* ------------------------------------------------------------------ */
      function updateClock() {
        const now = new Date();
        document.getElementById("clock-day").textContent =
          now.toLocaleDateString("en-US", { weekday: "long" });
        document.getElementById("clock-time").textContent =
          now.toLocaleTimeString("en-US", {
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          });
        document.getElementById("clock-date").textContent = [
          String(now.getDate()).padStart(2, "0"),
          String(now.getMonth() + 1).padStart(2, "0"),
          now.getFullYear(),
        ].join("-");
      }

      /* ------------------------------------------------------------------ */
      /* Network — mirrors Waybar ethernet 󰈁 / wifi with SSID               */
      /* ------------------------------------------------------------------ */
      function renderNetwork(network) {
        const el = document.getElementById("network");
        if (!network) return;
        const iface = network.defaultInterface;
        if (!iface) {
          el.textContent = "󰈂";
          return;
        }
        if (iface.type === "ethernet") {
          el.textContent = "󰈁";
        } else if (iface.type === "wifi") {
          const gw = network.defaultGateway;
          const ssid = gw?.ssid ?? "WiFi";
          const sig =
            gw?.signalStrength != null
              ? ` (${Math.round(gw.signalStrength)}%)`
              : "";
          el.textContent = `${ssid}${sig} `;
        } else {
          el.textContent = "󰈂";
        }
      }

      /* ------------------------------------------------------------------ */
      /* Audio — mirrors Waybar pulseaudio icon + volume%                    */
      /* ------------------------------------------------------------------ */
      function renderAudio(audio) {
        const el = document.getElementById("audio");
        if (!audio) return;
        const dev = audio.defaultPlaybackDevice;
        if (!dev) {
          el.textContent = "";
          return;
        }
        if (dev.isMuted) {
          el.textContent = "MUTE";
        } else {
          const vol = Math.round(dev.volume ?? 0);
          const icon = vol > 50 ? " " : " ";
          el.textContent = `${icon}${vol}%`;
        }
      }

      /* ------------------------------------------------------------------ */
      /* Memory — mirrors Waybar  {}%                                       */
      /* ------------------------------------------------------------------ */
      function renderMemory(memory) {
        const el = document.getElementById("memory");
        if (!memory) return;
        el.textContent = ` ${Math.round(memory.usage ?? 0)}%`;
      }

      /* ------------------------------------------------------------------ */
      /* CPU — mirrors Waybar  {usage:2}%                                  */
      /* ------------------------------------------------------------------ */
      function renderCpu(cpu) {
        const el = document.getElementById("cpu");
        if (!cpu) return;
        el.textContent = ` ${Math.round(cpu.usage ?? 0)}%`;
      }

      /* ------------------------------------------------------------------ */
      /* GPU — mirrors Waybar custom/gpu script                              */
      /* ------------------------------------------------------------------ */
      function renderGpu(gpu) {
        const el = document.getElementById("gpu");
        if (!gpu) {
          el.textContent = "";
          return;
        }
        const g = (gpu.gpus ?? [])[0];
        if (!g) {
          el.textContent = "";
          return;
        }
        el.textContent = `󰢮 ${Math.round(g.coreLoadPercent ?? 0)}%`;
      }

      /* ------------------------------------------------------------------ */
      /* Disk — mirrors Waybar  / {percentage_used}%                       */
      /* ------------------------------------------------------------------ */
      function renderDisk(disk) {
        const el = document.getElementById("disk");
        if (!disk) return;
        const drives = disk.disks ?? [];
        const c =
          drives.find(
            (d) =>
              d.mountPoint === "C:\\" ||
              d.mountPoint === "C:/" ||
              d.name === "C:",
          ) ?? drives[0];
        el.textContent = c ? `  C: ${Math.round(c.usedPercent ?? 0)}%` : "";
      }
    </script>
  </body>
</html>
