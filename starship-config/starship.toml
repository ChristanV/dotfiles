#$cmd_duration\
[character]
success_symbol = '[вќЇ](#769ff0)'
error_symbol = '[вќЇ](#769ff0)'

[os]
style = "fg:#e3e5e5 bg:#769ff0"
format = '[$symbol]($style)'
disabled = false

[username]
show_always = false
style_user = "fg:#e3e5e5 bg:#769ff0"
format = "[$user@]($style)"
disabled = true

[hostname]
ssh_only = true
style = "fg:#e3e5e5 bg:#769ff0"
format = "[$hostname]($style)"
disabled = true

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[$path]($style)"
truncation_length = 15
truncate_to_repo = false        #truncation_symbol = "вЂ¦/"

[directory.substitutions]
"Documents" = "у°€™ "
"Downloads" = "пЂ™ "
"Music" = "пЂЃ "
"Pictures" = "пЂѕ "

[git_branch]
style = "bg:#394260"
format = '[[ $symbol$branch](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[$ahead_behind($all_status) ](fg:#769ff0 bg:#394260)]($style)'
modified = ' у°·€'
conflicted = ' у°€ё'
staged = ' пѓ‡'
up_to_date = ' вњ“'
ahead = ' оЄЎ'
behind = ' оЄљ'
untracked = ' у°ј…'
stashed = ' о¶Ў'
diverged = ' у°¦»'
deleted = ' оЄЃ'

[cmd_duration]
min_time = 1_000
#style = "bg:#1d2230"
format = ' $duration'

# Languages
[nodejs]
