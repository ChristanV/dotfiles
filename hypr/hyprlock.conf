general {
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
}

background {
    blur_passes = 1
    blur_size = 1
    contrast = 0.9
    brightness = 0.7
    path = /home/$USER/.config/hypr/wallpapers/dark-galaxy-wallpaper-2560x1440_51.jpg
}

input-field {
    monitor = DP-1
    size = 280, 50
    position = 0, -120
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true

    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(20, 20, 20, 0.7)
    font_color = rgb(220, 220, 220)
    check_color = rgb(80, 160, 220)
    fail_color = rgb(220, 80, 80)

    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
}

label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(220, 220, 220, 1.0)
    font_size = 90
    font_family = Noto Sans Medium
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(220, 220, 220, 0.9)
    font_size = 22
    font_family = Noto Sans Medium
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = $USER
    color = rgba(220, 220, 220, 0.8)
    font_size = 16
    font_family = Noto Sans Medium
    position = 0, -60
    halign = center
    valign = center
}
